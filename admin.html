<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador - Luna Mágica</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="Imagenes/Red and Yellow Catering Flat Illustrative Food Place Logo (1).png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.0.0/tsparticles.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div id="particles-js"></div>

    <!-- Sección de Login para Administrador -->
    <div id="login-section">
        <h2>Inicio de sesión - Administrador</h2>
        <form id="login-form">
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit">Iniciar sesión</button>
        </form>
    </div>

    <!-- Sección de Administración (oculta hasta inicio de sesión correcto) -->
    <div id="admin-section" style="display: none;">
        <h3>👨‍🍳 Administrador</h3>

        <!-- Formulario para agregar un nuevo plato -->
        <form id="add-dish-form">
            <input type="text" id="dish-name" placeholder="Nombre del plato" required>
            <select id="dish-category" required>
                <option value="" disabled selected>Selecciona una categoría</option>
                <option value="Entradas">Entradas</option>
                <option value="Platos principales">Platos principales</option>
                <option value="Postres">Postres</option>
                <option value="Bebidas">Bebidas</option>
            </select>
            <input type="text" id="dish-price" placeholder="Precio" required>
            <input type="file" id="dish-img-upload" accept="image/*" required>
            <textarea id="dish-description" placeholder="Descripción del plato" required></textarea>
            <button type="submit">Agregar Plato</button>
        </form>

        <!-- Lista de platos -->
        <h4>Platos Disponibles</h4>
        <div id="menu-list" class="admin"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js"></script>
    <script src="admin-auth.js" type="module"></script> <!-- Este script manejará la autenticación -->
    <script src="admin.js" type="module"></script> <!-- Tu código existente -->
</body>

</html>
